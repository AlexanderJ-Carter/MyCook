# 从 fork 拉取 → 同步 → 构建 → 发布到 GitHub Pages
name: Sync & Build

on:
    push:
        branches: [main] # 推送到 main 时自动重建并发布
    schedule:
        - cron: '0 2 * * *' # 每天 UTC 2:00（北京 10:00）再同步一次
    workflow_dispatch: {}

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 使用 Node 24 运行 actions，消除 Node 20 弃用警告

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages-${{ github.ref }}
    cancel-in-progress: true

jobs:
    sync-and-build:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Checkout MyCook
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Clone upstream repos with retry
              run: |
                  # 克隆时重试 3 次，避免网络/限流导致失败
                  clone_with_retry() {
                    local repo=$1
                    local dest=$2
                    for i in 1 2 3; do
                      if git clone --depth 1 "$repo" "$dest"; then
                        echo "Successfully cloned $repo"
                        return 0
                      fi
                      echo "Attempt $i failed, retrying in 5s..."
                      rm -rf "$dest"
                      sleep 5
                    done
                    echo "Failed to clone $repo after 3 attempts"
                    return 1
                  }

                  # 可选仓库：失败时仅警告，不中断构建
                  clone_with_retry_optional() {
                    local repo=$1
                    local dest=$2
                    for i in 1 2 3; do
                      if git clone --depth 1 "$repo" "$dest"; then
                        echo "Successfully cloned $repo"
                        return 0
                      fi
                      echo "Warning: Attempt $i failed for optional repo $repo, retrying in 5s..."
                      rm -rf "$dest"
                      sleep 5
                    done
                    echo "Warning: Failed to clone optional $repo after 3 attempts - continuing without it"
                    return 0
                  }

                  clone_with_retry https://github.com/AlexanderJ-Carter/CookLikeHOC.git upstream/CookLikeHOC
                  clone_with_retry https://github.com/AlexanderJ-Carter/HowToCook.git upstream/HowToCook
                  clone_with_retry_optional https://github.com/king-jingxiang/HowToCook.git upstream/HowToCookImages

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --prefer-offline --no-audit

            - name: Sync & Build
              env:
                  COOKLIKEHOC_PATH: ${{ github.workspace }}/upstream/CookLikeHOC
                  HOWTOCOOK_PATH: ${{ github.workspace }}/upstream/HowToCook
                  COOKLIKEHOC_BRANCH: main
                  HOWTOCOOK_BRANCH: master
                  VITEPRESS_BASE: /
              run: |
                  node scripts/sync-upstream.js
                  npm run docs:build

            # 若报错 Get Pages site failed / Not Found：请到仓库 Settings → Pages → Build and deployment → Source 选择「GitHub Actions」
            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: .vitepress/dist

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
