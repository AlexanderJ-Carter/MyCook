# 从 fork 拉取 → 同步 → 构建 → 发布到 GitHub Pages
name: Sync & Build

on:
    push:
        branches: [main] # 推送到 main 时自动重建并发布
    schedule:
        - cron: '0 2 * * *' # 每天 UTC 2:00（北京 10:00）再同步一次
    workflow_dispatch: {}

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 使用 Node 24 运行 actions，消除 Node 20 弃用警告

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    sync-and-build:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Checkout MyCook
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Clone CookLikeHOC
              run: |
                  git clone --depth 1 https://github.com/AlexanderJ-Carter/CookLikeHOC.git upstream/CookLikeHOC

            - name: Clone HowToCook
              run: |
                  git clone --depth 1 https://github.com/AlexanderJ-Carter/HowToCook.git upstream/HowToCook

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Install & Sync & Build
              env:
                  COOKLIKEHOC_PATH: ${{ github.workspace }}/upstream/CookLikeHOC
                  HOWTOCOOK_PATH: ${{ github.workspace }}/upstream/HowToCook
                  VITEPRESS_BASE: /
              run: |
                  npm ci
                  node scripts/sync-upstream.js
                  npm run docs:build

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: .vitepress/dist

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
