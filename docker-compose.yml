# MyCook - 生产镜像内已含克隆与同步，无需挂载
# 开发：docker compose --profile dev up

services:
  mycook:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COOKLIKEHOC_BRANCH: main
        HOWTOCOOK_BRANCH: master
    image: mycook:latest
    container_name: mycook
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # 开发：需先本地 sync 或挂载上游目录
  mycook-dev:
    image: node:22-alpine
    container_name: mycook-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run docs:dev -- --host 0.0.0.0"
    profiles:
      - dev
